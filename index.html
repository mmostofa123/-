<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning App - User Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #9333ea);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
        }
        .hide { display: none; }
    </style>
</head>
<body class="flex justify-center items-center p-4">

    <div class="w-full max-w-md w-full relative">

        <div id="auth-section" class="glass p-6 w-full shadow-2xl">
            <h2 class="text-3xl font-bold mb-6 text-center">Welcome</h2>
            <input type="email" id="email" placeholder="Email" class="w-full mb-4 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 outline-none border border-white/10">
            <input type="password" id="password" placeholder="Password" class="w-full mb-4 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 outline-none border border-white/10">
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition">Login</button>
            <button id="signup-btn" class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-lg font-bold mt-3 transition">Sign Up</button>
            <p id="auth-error" class="text-red-400 text-sm mt-3 text-center"></p>
        </div>

        <div id="app-section" class="hide w-full space-y-4">
            
            <div class="glass p-5 flex flex-col items-center shadow-lg relative">
                <button id="logout-btn" class="absolute top-4 right-4 text-sm bg-red-500/80 px-3 py-1 rounded">Logout</button>
                <p class="text-gray-300 text-sm">Total Balance</p>
                <h1 class="text-4xl font-bold mt-1 mb-2">৳ <span id="balance">0</span></h1>
                <div class="flex gap-4 text-sm w-full mt-4 bg-white/5 p-3 rounded-lg">
                    <div class="flex-1 text-center">
                        <p class="text-gray-400">Level</p>
                        <p class="font-bold text-yellow-400" id="user-level">Bronze</p>
                    </div>
                    <div class="flex-1 text-center border-l border-white/20">
                        <p class="text-gray-400">Total Earned</p>
                        <p class="font-bold">৳ <span id="total-earned">0</span></p>
                    </div>
                </div>
            </div>

            <div class="glass p-5 shadow-lg">
                <h3 class="font-bold text-lg mb-3 border-b border-white/20 pb-2">Earn Money</h3>
                
                <div class="space-y-3">
                    <button id="task-video" class="w-full bg-white/10 hover:bg-white/20 p-3 rounded flex justify-between items-center transition border border-white/10">
                        <span>📺 Watch Video Ad</span>
                        <span class="text-green-400 font-bold">+5 ৳</span>
                    </button>
                    <button id="task-timer" class="w-full bg-white/10 hover:bg-white/20 p-3 rounded flex justify-between items-center transition border border-white/10">
                        <span>⏳ Timer Task (30s)</span>
                        <span class="text-green-400 font-bold">+10 ৳</span>
                    </button>
                    <button id="task-social" class="w-full bg-white/10 hover:bg-white/20 p-3 rounded flex justify-between items-center transition border border-white/10">
                        <span>👥 Join Telegram</span>
                        <span class="text-green-400 font-bold">+20 ৳</span>
                    </button>
                </div>
                <div id="task-status" class="mt-3 text-center text-sm text-yellow-300"></div>
            </div>

            <div class="glass p-5 shadow-lg">
                <h3 class="font-bold text-lg mb-3 border-b border-white/20 pb-2">Withdraw</h3>
                <select id="withdraw-method" class="w-full mb-3 p-3 rounded-lg bg-gray-800 text-white outline-none border border-white/10">
                    <option value="bkash">bKash</option>
                    <option value="nagad">Nagad</option>
                    <option value="rocket">Rocket</option>
                </select>
                <input type="number" id="withdraw-amount" placeholder="Amount (Min 100)" class="w-full mb-3 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 outline-none">
                <input type="text" id="withdraw-account" placeholder="Account Number" class="w-full mb-3 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 outline-none">
                <button id="withdraw-btn" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg font-bold transition">Submit Request</button>
                <p id="withdraw-msg" class="text-sm mt-3 text-center"></p>
            </div>

            <div class="glass p-5 shadow-lg mb-8">
                <h3 class="font-bold text-lg mb-3 border-b border-white/20 pb-2">Referral System</h3>
                <p class="text-sm text-gray-300 mb-2">Your Code:</p>
                <div class="bg-black/30 p-3 rounded text-center font-mono text-xl tracking-widest mb-3" id="ref-code">...</div>
                <p class="text-sm text-center">Total Referrals: <span id="ref-count" class="font-bold">0</span></p>
            </div>

        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc, increment, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // DOM Elements
        const authSec = document.getElementById('auth-section');
        const appSec = document.getElementById('app-section');
        let currentUserDoc = null;
        let isTaskActive = false;

        // --- AUTHENTICATION ---
        const generateDeviceId = () => {
            let id = localStorage.getItem('device_id');
            if(!id) { id = 'DEV-' + Math.random().toString(36).substr(2, 9); localStorage.setItem('device_id', id); }
            return id;
        };

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const refCode = Math.random().toString(36).substr(2, 6).toUpperCase();
                
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email: email,
                    balance: 0,
                    totalEarned: 0,
                    level: "Bronze",
                    refCode: refCode,
                    refCount: 0,
                    deviceId: generateDeviceId(),
                    status: 'active'
                });
            } catch (error) {
                document.getElementById('auth-error').innerText = error.message;
            }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (error) {
                document.getElementById('auth-error').innerText = error.message;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- DATA SYNC & UI ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSec.classList.add('hide');
                appSec.classList.remove('hide');
                
                // Realtime listen to user data
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if(data.status === 'blocked') {
                            alert("Your account is blocked.");
                            signOut(auth);
                            return;
                        }
                        currentUserDoc = docSnap.ref;
                        document.getElementById('balance').innerText = data.balance;
                        document.getElementById('total-earned').innerText = data.totalEarned;
                        document.getElementById('user-level').innerText = data.level;
                        document.getElementById('ref-code').innerText = data.refCode;
                        document.getElementById('ref-count').innerText = data.refCount;
                    }
                });
            } else {
                authSec.classList.remove('hide');
                appSec.classList.add('hide');
                currentUserDoc = null;
            }
        });

        // --- TASKS SYSTEM ---
        const awardPoints = async (amount, taskName) => {
            if(!currentUserDoc) return;
            await updateDoc(currentUserDoc, {
                balance: increment(amount),
                totalEarned: increment(amount)
            });
            document.getElementById('task-status').innerText = `✅ Earned ৳${amount} from ${taskName}!`;
            setTimeout(() => document.getElementById('task-status').innerText = "", 3000);
        };

        // 1. Video Task (Simulated)
        document.getElementById('task-video').addEventListener('click', () => {
            document.getElementById('task-status').innerText = "Watching video... please wait 5s";
            setTimeout(() => awardPoints(5, 'Video Ad'), 5000);
        });

        // 2. Timer Task with Anti-Tab Switch
        document.getElementById('task-timer').addEventListener('click', () => {
            if(isTaskActive) return;
            isTaskActive = true;
            let timeLeft = 30;
            const statusEl = document.getElementById('task-status');
            
            const timer = setInterval(() => {
                timeLeft--;
                statusEl.innerText = `⏳ Stay on page: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    isTaskActive = false;
                    document.removeEventListener("visibilitychange", handleVisibilityChange);
                    awardPoints(10, 'Timer Task');
                }
            }, 1000);

            const handleVisibilityChange = () => {
                if (document.hidden) {
                    clearInterval(timer);
                    isTaskActive = false;
                    statusEl.innerText = "❌ Task failed! You switched tabs.";
                    statusEl.classList.replace('text-yellow-300', 'text-red-400');
                    document.removeEventListener("visibilitychange", handleVisibilityChange);
                }
            };
            document.addEventListener("visibilitychange", handleVisibilityChange);
        });

        // 3. Social Task
        document.getElementById('task-social').addEventListener('click', () => {
            window.open("https://telegram.org", "_blank");
            setTimeout(() => awardPoints(20, 'Social Join'), 2000);
        });

        // --- WITHDRAW SYSTEM ---
        document.getElementById('withdraw-btn').addEventListener('click', async () => {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            const method = document.getElementById('withdraw-method').value;
            const account = document.getElementById('withdraw-account').value;
            const msgEl = document.getElementById('withdraw-msg');

            if(amount < 100 || !account) {
                msgEl.innerText = "❌ Min 100 ৳ and account number required.";
                msgEl.className = "text-sm mt-3 text-center text-red-400";
                return;
            }

            const currentBalance = parseInt(document.getElementById('balance').innerText);
            if(amount > currentBalance) {
                msgEl.innerText = "❌ Insufficient balance.";
                msgEl.className = "text-sm mt-3 text-center text-red-400";
                return;
            }

            try {
                // Deduct balance
                await updateDoc(currentUserDoc, { balance: increment(-amount) });
                // Create Request
                await addDoc(collection(db, "withdrawals"), {
                    userId: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    amount: amount,
                    method: method,
                    account: account,
                    status: 'pending',
                    timestamp: new Date()
                });
                msgEl.innerText = "✅ Withdraw request submitted successfully!";
                msgEl.className = "text-sm mt-3 text-center text-green-400";
                document.getElementById('withdraw-amount').value = '';
                document.getElementById('withdraw-account').value = '';
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
